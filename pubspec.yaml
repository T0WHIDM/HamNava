name: flutter_chat_room_app
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.0


dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.2.5
  font_awesome_flutter: ^10.12.0
  get_it: ^7.7.0
  pocketbase: ^0.23.2
  dartz: ^0.10.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.9.2
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  flutter_spinkit: ^5.2.2
  bloc: ^7.2.1
  flutter_bloc: ^7.3.3
  shared_preferences: ^2.5.3
  cupertino_icons: ^1.0.8
  share_plus: ^12.0.1
  flutter_launcher_icons: ^0.13.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  http: ^1.2.2
  video_compress: ^3.1.4
  video_player: ^2.11.1
  path_provider: ^2.1.5
  gal: ^2.3.2
  flutter_cache_manager: ^3.4.1
  awesome_snackbar_content: ^0.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0




flutter:


  uses-material-design: true

  assets:
    - assets/images/
  #   - images/a_dot_ham.jpeg






  fonts:

    - family: CR
      fonts:
        - asset: assets/fonts/Croissant-Bold.ttf

    - family: GR
      fonts:
        - asset: assets/fonts/GilroyMedium.ttf

    - family: GB
      fonts:
        - asset: assets/fonts/GilroyBold.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/hamnava.png"
  min_sdk_android: 21